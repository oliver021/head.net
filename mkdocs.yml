site_name: Head.Net Docs
site_description: Convention-first EF Core and Minimal API SDK for .NET
site_author: Oliver021
site_url: https://oliver021.github.io/Head.Net/
repo_url: https://github.com/oliver021/Head.Net
repo_name: oliver021/Head.Net
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: light
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: dark
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Example: getting-started/quick-example.md
      - Configuration: getting-started/configuration.md
      - Development Philosophy: getting-started/development-philosophy.md
  - Guides:
      - Entity Lifecycle Hooks: guides/entity-lifecycle-hooks.md
      - Custom Actions: guides/custom-actions.md
      - Query & Paging: guides/query-and-paging.md
      - Authorization & Ownership: guides/authorization-and-ownership.md
      - Setup Classes: guides/setup-classes.md
      - AI Agent Skill: guides/ai-agent-skill.md
  - Product:
      - Product Notes: product-notes.md
      - Roadmap: roadmap.md
