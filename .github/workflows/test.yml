name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0', '9.0']
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.1
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore Head.Net.sln

      - name: Build
        run: dotnet build Head.Net.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Head.Net.sln --no-restore --no-build --configuration Release --verbosity normal
