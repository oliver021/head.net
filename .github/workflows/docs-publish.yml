name: Publish Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: '24'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: website
        run: npm install --legacy-peer-deps

      - name: Check docs structure
        working-directory: website
        run: |
          echo "=== Checking docs folder ==="
          ls -la docs/
          echo ""
          echo "=== Checking sidebars.ts ==="
          head -20 sidebars.ts
          echo ""
          echo "=== Checking docusaurus.config.ts ==="
          grep -A 5 "presets:" docusaurus.config.ts || true

      - name: List docs files to verify
        working-directory: website
        run: |
          echo "=== Docs structure ==="
          find docs -type f -name "*.md" -o -name "*.json" | sort
          echo ""
          echo "=== File line endings ==="
          find docs -type f -name "*.md" | head -3 | xargs -I {} sh -c 'echo "File: {}"; file {}; echo'

      - name: Build docs with NODE_OPTIONS
        working-directory: website
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          DEBUG: "docusaurus:*"
          WEBPACK_PROGRESS: "false"
        run: |
          echo "=== Node & npm versions ==="
          node --version
          npm --version
          echo ""
          echo "=== Starting Docusaurus build ==="
          npm run build 2>&1

      - name: Verify build output
        working-directory: website
        if: always()
        run: |
          echo "=== Checking for build folder ==="
          if [ -d "build" ]; then
            echo "✓ Build folder exists"
            du -sh build
            ls -la build/ | head -20
          else
            echo "✗ Build folder NOT found!"
            ls -la
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: website/build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

  # TEMP: Docs build disabled due to webpack ProgressPlugin issue
  # TODO: Resolve ProgressPlugin validation error and re-enable
  # Tracking: Docusaurus 3.x incompatibility with current webpack version in CI
  # Workaround: Build docs locally and commit, OR switch to yarn package manager
