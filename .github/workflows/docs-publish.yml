name: Publish Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: '20'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: website
        run: npm ci --verbose

      - name: Check docs structure
        working-directory: website
        run: |
          echo "=== Checking docs folder ==="
          ls -la docs/
          echo ""
          echo "=== Checking sidebars.ts ==="
          head -20 sidebars.ts
          echo ""
          echo "=== Checking docusaurus.config.ts ==="
          grep -A 5 "presets:" docusaurus.config.ts || true

      - name: Build docs with verbose output
        working-directory: website
        run: |
          echo "=== Node & npm versions ==="
          node --version
          npm --version
          echo ""
          echo "=== Installed packages ==="
          npm ls --depth=0
          echo ""
          echo "=== Starting build ==="
          npm run build 2>&1 | tee build.log
        continue-on-error: true

      - name: Show build log if failed
        working-directory: website
        if: failure()
        run: tail -100 build.log

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: website/build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
